spring.application.name=WorkforceX

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:workforcex
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Auto-create/update tables from entities (dev only)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# H2 web console for inspecting data: http://localhost:8080/h2-console
spring.h2.console.enabled=true

# JWT (dev secret only - move to env variable before production)
app.jwt.secret=workforcex-dev-secret-key-change-this-before-production-use-1234567890
app.jwt.expiration-ms=86400000

