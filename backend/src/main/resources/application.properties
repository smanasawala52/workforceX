# This is the default profile, used for local development.
# It uses an in-memory H2 database.

# --- Spring Profiles ---
# When running locally, the 'dev' profile is active by default.
# On platforms like Railways, set a SPRING_PROFILES_ACTIVE environment variable to 'prod'
# to activate the production-specific properties.
spring.profiles.active=dev

# --- Application ---
spring.application.name=WorkforceX

# --- H2 in-memory database (for 'dev' profile) ---
spring.datasource.url=jdbc:h2:mem:workforcex
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.h2.console.enabled=true

# --- File Uploads ---
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# --- JPA Settings ---
spring.jpa.open-in-view=false

# --- JWT ---
# For local dev, this secret is fine.
# For production, this should be overridden by an environment variable.
app.jwt.secret=workforcex-dev-secret-key-change-this-before-production-use-1234567890
app.jwt.expiration-ms=86400000
