# This profile is activated when running in production (e.g., on Railways)
# It expects the database credentials to be provided as environment variables.

# --- Datasource ---
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Add SSL configuration required by Supabase
spring.datasource.properties.sslmode=require

# --- JPA / Hibernate ---
# Use "update" in production. This will attempt to add new columns/tables but won't delete anything.
# For a robust production setup, this should eventually be replaced with a dedicated migration tool like Flyway.
spring.jpa.hibernate.ddl-auto=update

# Set the PostgreSQL dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- JWT Secret ---
app.jwt.secret=${APP_JWT_SECRET}

# --- Document storage (prod = Supabase Storage via its S3-compatible API) ---
# Reuses the same Supabase project as the production database, so there's
# just one dashboard/account to manage. The bucket MUST be created as
# PRIVATE (Storage -> New bucket -> "Public bucket" unchecked) since these
# are identity documents (Aadhaar/PAN/passport/etc) - access only happens
# through short-lived signed URLs generated per-request.
#
# Get these 4 values from: Project Settings -> Storage -> S3 Connection
# (enable "Connect via S3 protocol" first, then generate an access key pair):
#   SUPABASE_S3_ENDPOINT           e.g. https://<project-ref>.storage.supabase.co/storage/v1/s3
#   SUPABASE_S3_REGION             the region shown on that page
#   SUPABASE_S3_ACCESS_KEY_ID      generated access key (server-side only)
#   SUPABASE_S3_SECRET_ACCESS_KEY  generated secret key (server-side only, never ship in the apps)
app.storage.supabase.endpoint=${SUPABASE_S3_ENDPOINT}
app.storage.supabase.region=${SUPABASE_S3_REGION}
app.storage.supabase.access-key-id=${SUPABASE_S3_ACCESS_KEY_ID}
app.storage.supabase.secret-access-key=${SUPABASE_S3_SECRET_ACCESS_KEY}
app.storage.supabase.bucket=${SUPABASE_STORAGE_BUCKET:verification-documents}
app.storage.supabase.signed-url-expiry-seconds=900

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html