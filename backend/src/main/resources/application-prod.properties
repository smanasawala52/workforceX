# This profile is activated when running in production (e.g., on Railways)
# It expects the database credentials to be provided as environment variables.

# --- Datasource ---
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Add SSL configuration required by Supabase
spring.datasource.properties.sslmode=require

# --- JPA / Hibernate ---
# Use "update" in production. This will attempt to add new columns/tables but won't delete anything.
# For a robust production setup, this should eventually be replaced with a dedicated migration tool like Flyway.
spring.jpa.hibernate.ddl-auto=update

# Set the PostgreSQL dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- JWT Secret ---
app.jwt.secret=${APP_JWT_SECRET}
