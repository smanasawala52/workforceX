# This profile is activated when running in production (e.g., on Railways)
# It expects the database credentials to be provided as environment variables.

# --- Datasource ---
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Add SSL configuration required by Supabase
spring.datasource.properties.sslmode=require

# --- JPA / Hibernate ---
# Use "update" in production. This will attempt to add new columns/tables but won't delete anything.
# For a robust production setup, this should eventually be replaced with a dedicated migration tool like Flyway.
spring.jpa.hibernate.ddl-auto=update

# Set the PostgreSQL dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- JWT Secret ---
app.jwt.secret=${APP_JWT_SECRET}

# --- Document storage (prod = Supabase Storage) ---
# Reuses the same Supabase project as the production database, so there's
# just one dashboard/account to manage. The bucket MUST be created as
# PRIVATE (Storage -> New bucket -> "Public bucket" unchecked) since these
# are identity documents (Aadhaar/PAN/passport/etc) - access only happens
# through short-lived signed URLs generated per-request.
#
# SUPABASE_STORAGE_URL: e.g. https://<project-ref>.supabase.co
# SUPABASE_SERVICE_ROLE_KEY: the service_role key from Project Settings ->
#   API. NOT the anon/public key - keep this server-side only, never ship it
#   in the Android apps.
app.storage.supabase.url=${SUPABASE_STORAGE_URL}
app.storage.supabase.service-key=${SUPABASE_SERVICE_ROLE_KEY}
app.storage.supabase.bucket=${SUPABASE_STORAGE_BUCKET:verification-documents}
app.storage.supabase.signed-url-expiry-seconds=900
