# This is the configuration for all automated tests.

# --- Profiles & App Name ---
spring.profiles.active=test
spring.application.name=WorkforceX-Test

# --- Database (H2 In-Memory) ---
spring.datasource.url=jdbc:h2:mem:workforcex-test;DATABASE_TO_UPPER=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.h2.console.enabled=false

# --- File Uploads ---
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# --- JPA Settings ---
spring.jpa.open-in-view=false

# --- JWT (FOR TEST ENVIRONMENT ONLY) ---
# This secret is required for the application context to load during tests.
# It must be long enough to satisfy the JWT library's security requirements.
app.jwt.secret=ThisIsAValidAndSufficientlyLongSecretKeyForTestingPurposesOnly12345
app.jwt.expiration-ms=86400000
# 24 hours, matching the main config
